name: Platform CI

on:
  pull_request:
    paths:
      - "Platform/**"
  push:
    branches: [main]
    paths:
      - "Platform/**"

defaults:
  run:
    working-directory: Platform

jobs:
  secret-scan:
    # Warn-only for now (TECHNICAL_DEBT.md #5 / HANDOVER's security review):
    # continue-on-error so a false positive can't block a merge before the
    # rule set has been tuned against this repo's real history. Tighten to
    # blocking once it's run clean for a while.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  lint-typecheck-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aifa
          POSTGRES_PASSWORD: aifa_ci
          POSTGRES_DB: aifa_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aifa -d aifa_platform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aifa:aifa_ci@localhost:5432/aifa_platform_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: Platform/.nvmrc

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build
