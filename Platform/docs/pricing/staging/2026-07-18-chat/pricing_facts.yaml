# Phase E staging package -- section C: pricing_facts
# Batch: 2026-07-18 chat provider-pricing audit (Phase C / C.5 / D / D.5)
# Atomic pricing facts mapped toward Platform/docs/pricing/provider-pricing.csv's
# actual wide (33-column) schema. Where a fact fits the three standard wide columns
# (input_price_per_million / cached_input_price_per_million / output_price_per_million)
# that is noted as a direct fit. Where it does not, the generic billing_dimension +
# unit_price mechanism is proposed as a transformation, or a genuine no-fit is flagged --
# see destination_field_mapping on each record and mapping_manifest.yaml for the
# consolidated list.
# STRICT SOURCING RULE: every price_value below is a number Phase C.5 states literally
# (including where Phase C.5 itself already performed a derivation, e.g. OpenAI cache-write).
# Where Phase C.5 states a RULE without an absolute figure (OpenAI's >272K multiplier),
# only the rule is recorded -- no absolute price is computed or invented in this pass.
# NOTE ON "CONFIRMED-ABSENT" BATCH DISCOUNT REPRESENTATION: xAI's batch_discount_percent
# is recorded as 0 because Phase C.5 cites an explicit official statement that unlisted
# models (including grok-4.5) receive no discount -- a positive fact. DeepSeek's and
# Zhipu's are recorded as null because Phase C.5 only reports no batch pricing was found/
# shown, without an explicit official "no discount" statement -- absence of evidence, not
# an evidenced absence. This is an intentional distinction, not an inconsistency.

